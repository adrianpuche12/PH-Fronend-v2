name: Build & Deploy Frontend

on:
  push:
    branches: [main, develop]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Determinar ambiente
        id: env
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "IMAGE_TAG=latest" >> $GITHUB_OUTPUT
            echo "DEPLOY_DIR=/opt/humberto-v2/prod" >> $GITHUB_OUTPUT
          else
            echo "IMAGE_TAG=dev-latest" >> $GITHUB_OUTPUT
            echo "DEPLOY_DIR=/opt/humberto-v2/dev" >> $GITHUB_OUTPUT
          fi

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build y push imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            adrianpuche/humberto-v2-frontend:${{ steps.env.outputs.IMAGE_TAG }}

      - name: Deploy en servidor
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ${{ steps.env.outputs.DEPLOY_DIR }}
            docker compose pull
            docker compose up -d
            docker image prune -f
