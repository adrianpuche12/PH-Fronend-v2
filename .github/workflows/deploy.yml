name: CI — PH Frontend

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  typecheck-and-build:
    name: TypeScript + Build Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Verificar build web
        run: npx expo export --platform web
        env:
          EXPO_PUBLIC_API_URL: https://ph-backend-dev-staging.up.railway.app
          EXPO_PUBLIC_KEYCLOAK_URL: https://keycloak.belopia.app
          EXPO_PUBLIC_KEYCLOAK_REALM: proyecto-h-dev
